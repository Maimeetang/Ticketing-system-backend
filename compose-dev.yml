name: pos-dev
services:
  backend:
    build:
      context: .
      target: builder
    container_name: pos-backend-dev
    ports:
      - "${PORT}:8080"
    volumes:
      - ./:/app
    command: ["air", "-c", ".air.toml"]
    environment:
      - PORT=${PORT}
      - APP_ENV=${APP_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - pos-dev-net

  postgres:
    image: postgres:18-alpine
    container_name: pos-db-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT}:5432"
    restart: unless-stopped
    networks:
      - pos-dev-net

volumes:
  postgres_data:

networks:
  pos-dev-net:
    external: true
