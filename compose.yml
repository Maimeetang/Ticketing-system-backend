name: ticketing-backend-dev
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing-backend-dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./data:/app/data
      - /app/tmp
      - go_cache:/root/.cache/go-build
      - go_mod_cache:/go/pkg/mod
    working_dir: /app
    command: air
    environment:
      - PORT=8080
      - APP_MODE=${APP_MODE:-development}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
    restart: unless-stopped

volumes:
  go_cache:
  go_mod_cache:
